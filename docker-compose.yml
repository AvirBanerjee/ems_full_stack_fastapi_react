version: "3.9"

services:

  backend:
    build: ./backend
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/app.db
    restart: always

  frontend:
    build: ./frontend
    container_name: vite_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

volumes:
  sqlite_data: